<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Cancer de Cuello Uterino</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<script>
  if (localStorage.getItem("cervix_app_modo_oscuro") === "1") {
    document.body.classList.add("tema-oscuro");
  }
</script>

<div class="auth-bg">
  <div class="auth-box">
    <div class="logo-area">
      <div class="icono"><span>C</span></div>
      <div class="nombre-app">Sistema de Diagnostico</div>
    </div>
    <h2>Crear Cuenta</h2>
    <div class="subtitulo">Completa el formulario para registrarte</div>

    <form id="form-registro">
      <div class="campo">
        <label>Usuario</label>
        <input type="text" id="reg-usuario" placeholder="nombre de usuario" required minlength="3" maxlength="32">
      </div>
      <div class="campo">
        <label>Correo electronico</label>
        <input type="email" id="reg-correo" placeholder="tu_correo@gmail.com" required>
      </div>
      <div class="campo">
        <label>Contrasena</label>
        <input type="password" id="reg-contrasena" placeholder="contrasena" required minlength="4">
      </div>
      <div class="campo">
        <label>Confirmar contrasena</label>
        <input type="password" id="reg-confirmar" placeholder="repite la contrasena" required>
      </div>
      <div class="campo">
        <label>Codigo de invitacion</label>
        <input type="text" id="reg-codigo" placeholder="Codigo entregado por tu administrador" required
               style="text-transform:uppercase;">
      </div>
      <p id="registro-error" style="display:none; color:#a02020; font-size:0.8571rem; margin-bottom:10px;"></p>
      <button type="submit" class="btn-principal">Crear Cuenta</button>
    </form>

    <div class="auth-link">Ya tienes cuenta? <a href="login.html">Iniciar sesion</a></div>
  </div>
</div>

<script src="js/model/ApiClient.js"></script>
<script src="js/model/AuthModel.js"></script>
<script src="js/view/RegistroView.js"></script>
</body>
</html>
