<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Cancer de Cuello Uterino</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="auth-bg">
  <div class="auth-box">
    <div class="logo-area">
      <div class="icono"><span>C</span></div>
      <div class="nombre-app">Sistema de Diagnostico</div>
    </div>
    <h2>Crear Cuenta</h2>
    <div class="subtitulo">Completa el formulario para registrarte</div>

    <form id="form-registro">
      <div class="campo">
        <label>Nombre completo</label>
        <input type="text" placeholder="Ej: Maria Garcia">
      </div>
      <div class="campo">
        <label>Usuario</label>
        <input type="text" placeholder="nombre de usuario">
      </div>
      <div class="campo">
        <label>Contrasena</label>
        <input type="password" placeholder="contrasena">
      </div>
      <div class="campo">
        <label>Confirmar contrasena</label>
        <input type="password" placeholder="repite la contrasena">
      </div>
      <button type="submit" class="btn-principal">Crear Cuenta</button>
    </form>

    <div class="auth-link">Ya tienes cuenta? <a href="login.html">Iniciar sesion</a></div>
  </div>
</div>

<script src="js/view/RegistroView.js"></script>
</body>
</html>
